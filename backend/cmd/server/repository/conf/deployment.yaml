server:
  hostname: "localhost"
  port: 8090

tls:
  min_version: "1.3"
  cert_file: "repository/resources/security/server.cert"
  key_file: "repository/resources/security/server.key"

database:
  identity:
    type: "postgres"
    hostname: "localhost"
    port: 5432
    name: "thunder_identity"
    username: "postgres"
    password: "postgres"
    sslmode: "disable"

  runtime:
    type: "postgres"
    hostname: "localhost"
    port: 5432
    name: "thunder_runtime"
    username: "postgres"
    password: "postgres"
    sslmode: "disable"

  user:
    type: "postgres"
    hostname: "localhost"
    port: 5432
    name: "thunder_user"
    username: "postgres"
    password: "postgres"
    sslmode: "disable"

crypto:
  encryption:
    key: "file://repository/resources/security/crypto.key"
  keys:
    - id: "default-key"
      cert_file: "repository/resources/security/signing.cert"
      key_file: "repository/resources/security/signing.key"

jwt:
    preferred_key_id: "default-key"

cors:
  allowed_origins:
    - "https://localhost:3000"

passkey:
  allowed_origins:
    - "https://localhost:8090"
